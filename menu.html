<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main Canteen</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f2f2f2;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: white;
  position: sticky;
  top: 0;
}

.header h2 {
  font-size: 20px;
}

/* SCROLLABLE MENU */
.menu {
  height: calc(100vh - 140px);
  overflow-y: auto;
  padding: 10px;
}

/* ITEM CARD */
.item {
  display: flex;
  background: white;
  padding: 10px;
  border-radius: 15px;
  margin-bottom: 10px;
  align-items: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.item img {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
}

.info {
  flex: 1;
  margin-left: 10px;
}

.info h4 {
  font-size: 16px;
}

.right {
  text-align: right;
}

.right button {
  margin-top: 5px;
  background: #ff7a00;
  border: none;
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
}

/* CART */
.cart {
  position: fixed;
  bottom: 20px;
  left: 10%;
  width: 80%;
  background: #ff7a00;
  color: white;
  text-align: center;
  padding: 14px;
  border-radius: 30px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="goBack()">←</button>
  <h2>Main Canteen</h2>
  <span>🔔</span>
</div>

<div class="menu">

  <div class="item">
    <img src="assets/burger.jpg" class="food-img">
    
    <div class="info">
      <h4>Cheese Burger</h4>
      ⭐ 4.5
    </div>
    <div class="right">
      ₹89 <br>
      <button onclick="add()">+ Add</button>
    </div>
  </div>

  <div class="item">
    <img src="assets/wrap.jpg" class="food-img">
    
    <div class="info">
      <h4>Paneer Wrap</h4>
      ⭐ 4.0
    </div>
    <div class="right">
      ₹69 <br>
      <button onclick="add()">+ Add</button>
    </div>
  </div>

  <div class="item">
    <img src="assets/coffee.jpg" class="food-img">
    
    <div class="info">
      <h4>Cold Coffee</h4>
      ⭐ 4.5
    </div>
    <div class="right">
      ₹49 <br>
      <button onclick="add()">+ Add</button>
    </div>
  </div>

</div>

<button class="cart" onclick="goCart()">
  🛒 View Cart (<span id="count">0</span>)
</button>

<script>
let count = 0;

function add() {
  count++;
  document.getElementById("count").innerText = count;
}

function goBack() {
  window.location.href = "canteen.html";
}

function goCart() {
  window.location.href = "cart.html";
}
</script>
</body>
</html>
