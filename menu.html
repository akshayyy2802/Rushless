<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Canteen</title>
  <link rel="stylesheet" href="menu.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="back" onclick="goBack()">←</span>
    <h2>Main Canteen</h2>
    <span class="bell">🔔</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <span class="active">All</span>
    <span>Snacks</span>
    <span>Meals</span>
    <span>Beverages</span>
    <span>Combos</span>
  </div>

  <!-- MENU LIST (SCROLLABLE) -->
  <div class="menu">

    <!-- ITEM -->
    <div class="item">
      <img src="https://via.placeholder.com/80">
      <div class="info">
        <h3>Cheese Burger</h3>
        <p>⭐ 4.5</p>
      </div>
      <div class="right">
        <span>₹89</span>
        <button onclick="addItem()">+ Add</button>
      </div>
    </div>

    <div class="item">
      <img src="https://via.placeholder.com/80">
      <div class="info">
        <h3>Veg Paneer Wrap</h3>
        <p>⭐ 4.0</p>
      </div>
      <div class="right">
        <span>₹69</span>
        <button onclick="addItem()">+ Add</button>
      </div>
    </div>

    <div class="item">
      <img src="https://via.placeholder.com/80">
      <div class="info">
        <h3>Cold Coffee</h3>
        <p>⭐ 4.5</p>
      </div>
      <div class="right">
        <span>₹49</span>
        <button onclick="addItem()">+ Add</button>
      </div>
    </div>

    <div class="item">
      <img src="https://via.placeholder.com/80">
      <div class="info">
        <h3>Margherita Pizza</h3>
        <p>⭐ 4.0</p>
      </div>
      <div class="right">
        <span>₹129</span>
        <button onclick="addItem()">+ Add</button>
      </div>
    </div>

    <div class="item">
      <img src="https://via.placeholder.com/80">
      <div class="info">
        <h3>French Fries</h3>
        <p>⭐ 3.5</p>
      </div>
      <div class="right">
        <span>₹59</span>
        <button onclick="addItem()">+ Add</button>
      </div>
    </div>

  </div>

  <!-- CART BUTTON -->
  <div class="cart">
    🛒 View Cart (<span id="count">0</span> items)
  </div>

  <script src="menu.js"></script>

</body>
</html>
