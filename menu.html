<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f5f5f5;
  padding: 10px;
}

/* ITEM CARD */
.item {
  background: white;
  border-radius: 15px;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* IMAGE */
.food-img {
  width: 70px;
  height: 70px;
  border-radius: 12px;
  object-fit: cover;
}

/* INFO */
.info {
  flex: 1;
  margin-left: 12px;
}

.info h3 {
  font-size: 16px;
}

.info p {
  color: gray;
  font-size: 13px;
}

/* RIGHT SIDE */
.right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}

/* PRICE */
.price {
  font-weight: 600;
}

/* ADD BUTTON */
.add-btn {
  background: #ff7a00;
  color: white;
  border: none;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
}

/* CART BUTTON */
.cart-btn {
  position: fixed;
  bottom: 20px;
  left: 10%;
  width: 80%;
  background: #ff7a00;
  color: white;
  text-align: center;
  padding: 15px;
  border-radius: 30px;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- ITEM 1 -->
<div class="item">
  <img src="assets/burger.jpg" class="food-img">
  <div class="info">
    <h3>Cheese Burger</h3>
    <p>⭐ 4.5</p>
  </div>
  <div class="right">
    <span class="price">₹89</span>
    <button class="add-btn" onclick="add()">+ Add</button>
  </div>
</div>

</div>

  <div class="right">
    <span class="price">₹129</span>

  </div>
</div>

<!-- ITEM 5 -->
<div class="item">
  <img src="assets/fries.jpg" class="food-img">

    <h3>French Fries</h3>

  </div>
  <div class="right">

<!-- ITEM 6 -->
<div class="item">
  <img src="assets/pasta.jpg" class="food-img">

<!-- ITEM 7 -->

<!-- VIEW CART BUTTON -->
<div class="cart-btn" onclick="goCart()">
  🛒 View Cart
</div>

<script>
function add() {
  alert("Item added to cart 🛒");
}

function goCart() {
  window.location.href = "cart.html";
}
</script>

</body>
</html>
