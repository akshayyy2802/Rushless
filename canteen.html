<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canteen</title>

<link rel="stylesheet" href="canteen.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">RushLess 🍽️</div>
  <div class="bell">🔔</div>
</div>

<!-- TITLE -->
<div class="title">
  Select <span>Canteen</span>
</div>

<!-- SEARCH -->
<input class="search" placeholder="Search canteen or food...">

<!-- CARDS -->
<div class="card" onclick="openMenu('Main Canteen')">
  <div class="left">
    <div class="icon">🍱</div>
    <div>
      <div class="name">Main Canteen</div>
      <div class="sub">North Indian • Snacks</div>
    </div>
  </div>
  <div class="status">Open now ></div>
</div>

<div class="card" onclick="openMenu('South Canteen')">
  <div class="left">
    <div class="icon">🥞</div>
    <div>
      <div class="name">South Canteen</div>
      <div class="sub">South Indian • Dosa</div>
    </div>
  </div>
  <div class="status">Open now ></div>
</div>

<div class="card" onclick="openMenu('Cafe Corner')">
  <div class="left">
    <div class="icon">☕</div>
    <div>
      <div class="name">Cafe Corner</div>
      <div class="sub">Beverages • Bakery</div>
    </div>
  </div>
  <div class="status">Open now ></div>
</div>

<div class="card" onclick="openMenu('Amul Parlour')">
  <div class="left">
    <div class="icon">🍦</div>
    <div>
      <div class="name">Amul Parlour</div>
      <div class="sub">Shakes • Ice Cream</div>
    </div>
  </div>
  <div class="status">Open now ></div>
</div>

<!-- NAV -->
<div class="nav">
  <div>🏠 Home</div>
  <div>📦 Orders</div>
  <div>👤 Profile</div>
</div>

<script src="canteen.js"></script>

</body>
</html>
