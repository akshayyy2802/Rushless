<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RushLess</title>
  <link rel="stylesheet" href="canteen.css">
</head>
<body>

  <div class="screen">

    <!-- Full UI Image -->
    <img src="assets/canteen.png" class="bg" alt="">

    <!-- Clickable Areas -->

    <!-- Main Canteen -->
    <div class="click main" onclick="openCanteen('main')"></div>

    <!-- South -->
    <div class="click south" onclick="openCanteen('south')"></div>

    <!-- Cafe -->
    <div class="click cafe" onclick="openCanteen('cafe')"></div>

    <!-- Amul -->
    <div class="click amul" onclick="openCanteen('amul')"></div>

  </div>

  <script src="canteen.js"></script>

</body>
</html>
