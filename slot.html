<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Slot</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

/* BODY */
body {
  background: #f5f5f5;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 15px;
  gap: 10px;
}

/* BACK BUTTON */
.back-btn {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
}

/* TITLE */
.title {
  text-align: center;
  margin: 10px 0;
}

.title h2 {
  font-size: 22px;
}

.subtitle {
  color: gray;
  font-size: 14px;
}

/* WAIT BOX */
.wait-box {
  background: #fff;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid orange;
}

.live {
  background: green;
  color: white;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 12px;
}

/* SLOTS */
.slots {
  margin: 10px;
}

.slot {
  background: #fff;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

/* ACTIVE SLOT */
.slot.active {
  background: #2e7d32;
  color: white;
}

/* FAST TAG */
.fast span {
  color: orange;
}

/* SUMMARY */
.summary {
  text-align: center;
  color: gray;
  font-size: 13px;
  margin-top: 10px;
}

/* ORDER TEXT */
.order {
  text-align: center;
  margin: 15px 0;
}

/* BUTTON */
.confirm {
  position: fixed;
  bottom: 20px;
  left: 10%;
  width: 80%;
  background: #ff7a00;
  color: white;
  padding: 15px;
  border-radius: 30px;
  text-align: center;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <button class="back-btn" onclick="goBack()">←</button>
</div>

<!-- TITLE -->
<div class="title">
  <h2>Choose your smart slot</h2>
  <div class="subtitle">Main Canteen</div>
</div>

<!-- WAIT INFO -->
<div class="wait-box">
  <span class="live">Live</span>
  <p><b>Current waiting:</b> 7 students</p>
  <p><b>Est. wait time:</b> ~12 min</p>
</div>

<!-- SLOTS -->
<div class="slots">

  <div class="slot" onclick="selectSlot(this)">
    12:00 PM <span>Available</span>
  </div>

  <div class="slot" onclick="selectSlot(this)">
    12:15 PM <span>Available</span>
  </div>

  <div class="slot fast" onclick="selectSlot(this)">
    12:30 PM <span>Filling fast</span>
  </div>

  <div class="slot" onclick="selectSlot(this)">
    12:45 PM <span>Available</span>
  </div>

  <div class="slot" onclick="selectSlot(this)">
    1:00 PM <span>Available</span>
  </div>

</div>

<!-- SUMMARY -->
<div class="summary">
  Based on real-time queue & AI prediction
</div>

<!-- ORDER -->
<div class="order">
  Samosa ×2 + Hot Garlic Pasta ×1 = ₹150
</div>

<!-- BUTTON -->
<div class="confirm" onclick="confirmSlot()">
  Confirm Booking
</div>

<!-- SCRIPT -->
<script>
function goBack() {
  window.location.href = "cart.html";
}

function selectSlot(element) {

  document.querySelectorAll(".slot").forEach(slot => {
    slot.classList.remove("active");
  });

  element.classList.add("active");
}

function confirmSlot() {
  window.location.href = "queue.html";
}
</script>

</body>
</html>
