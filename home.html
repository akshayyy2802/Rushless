<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RushLess</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f5f5f5;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* LOGO */
.logo {
  font-size: 28px;
  font-weight: bold;
  color: #0f5c5c;
  margin-bottom: 20px;
}

/* SKIP BUTTON (LOOKS LIKE TEXT) */
.skip-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
  color: black;

  /* remove text selection */
  user-select: none;
}

/* MAIN BUTTON */
.start-btn {
  background: #ff7a00;
  color: white;
  border: none;
  padding: 15px 25px;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- SKIP -->
<button class="skip-btn" onclick="goCanteen()">Skip for now</button>

<!-- LOGO -->
<div class="logo">RushLess</div>

<!-- MAIN BUTTON -->
<button class="start-btn" onclick="goCanteen()">
  Start Ordering
</button>

<script>
function goCanteen() {
  window.location.href = "canteen.html";
}
</script>

</body>
</html>
