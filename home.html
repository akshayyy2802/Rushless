<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RushLess - Home</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      color: #0f3d3e;
    }

    p {
      color: #555;
      margin-top: 10px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #ff7a00;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Welcome to RushLess 🚀</h1>
    <p>Skip the queue. Order faster.</p>

    <div class="card">
      <h3>🍔 Order Food</h3>
      <p>Browse menu and order instantly</p>
    </div>

    <div class="card">
      <h3>⏳ Skip Line</h3>
      <p>Get your food without waiting</p>
    </div>

    <button class="btn">Start Ordering</button>
  </div>

</body>
</html>
