<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RushLess Login</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>

  <div class="screen">

    <!-- Top Bar -->
    <div class="topbar">
      <h2 class="logo">RushLess 🍽️</h2>
      <span class="skip">Skip for now</span>
    </div>

    <!-- Main Content -->
    <div class="content">

      <h1 class="welcome">
        Welcome to<br>RushLess
      </h1>

      <p class="tagline">
        Lines Hatao, Time Bachao
      </p>

      <!-- Character Image -->
      <img src="assets/character.png" class="character" alt="">

      <!-- Google Button -->
      <button class="google-btn">
        <img src="https://img.icons8.com/color/48/google-logo.png"/>
        Continue with Google
      </button>

      <!-- OR Divider -->
      <div class="divider">
        <span></span>
        <p>OR</p>
        <span></span>
      </div>

      <!-- Phone Button -->
      <button class="phone-btn">
        📞 Continue with Phone Number
        <small>OTP se login in 10 seconds</small>
      </button>

      <!-- Signup -->
      <p class="signup">
        New to RushLess? <span>Sign Up</span>
      </p>

    </div>

  </div>

</body>
</html>
