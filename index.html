<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RushLess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="phone">

    <!-- Banner -->
    <img src="assets/banner.jpg" class="banner" alt="">

    <!-- App Name -->
    <h1 class="title">
      RushLess <span>🍽️</span>
    </h1>

    <!-- Decorative Lines -->
    <div class="lines">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- Tagline -->
    <p class="tagline">
      Lines Hatao,<br>
      Time Bachao
    </p>

    <!-- CTA Button -->
    <button class="btn" onclick="startApp()">
      Get Started
    </button>

  </div>

  <script src="script.js"></script>

</body>
</html>
