<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue Tracker</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
  text-align: center;
}

.card {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
}

.circle {
  width: 180px;
  height: 180px;
  margin: 20px auto;
  border-radius: 50%;
  background: conic-gradient(#ff7a00 40%, #2e7d32 60%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.inner {
  width: 130px;
  height: 130px;
  background: white;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.btn {
  margin: 20px;
  background: orange;
  color: white;
  padding: 15px;
  border-radius: 30px;
}
</style>
</head>

<body>

<h2>Live Queue Tracker</h2>

<div class="card">
  <h3>Order #RUSH-4582</h3>
  <p>Status: Being Prepared ⭐</p>
</div>

<div class="circle">
  <div class="inner">
    <h1>3</h1>
    <p>people ahead</p>
  </div>
</div>

<p>You can arrive 5 minutes before your slot.</p>

<div class="card">
  <p>Order #QX-8719 - 12 min</p>
  <p>Order #QX-8720</p>
  <p>Order #QX-8721</p>
</div>

<div class="btn">
  View Orders
</div>

</body>
</html>
